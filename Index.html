<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            color: #4CAF50;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-board {
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
        }

        .score-container {
            background-color: #2a2a2a;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        #game-board {
            background-color: #050505;
            border: 3px solid #4CAF50;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
        }

        .controls-hint {
            margin-top: 15px;
            color: #888;
            font-size: 0.9rem;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffffff;
            background-color: #4CAF50;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>Snake Game</h1>

    <div class="score-board">
        <div class="score-container">Score: <span id="score">0</span></div>
        <div class="score-container">High Score: <span id="high-score">0</span></div>
    </div>

    <canvas id="game-board" width="400" height="400"></canvas>

    <button class="btn" id="restart-btn" style="display: none;" onclick="resetGame()">Play Again</button>

    <div class="controls-hint">
        Use <strong>Arrow Keys</strong> or <strong>W, A, S, D</strong> to move.
    </div>

    <script>
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const restartBtn = document.getElementById('restart-btn');

        // Grid Settings
        const gridSize = 20; // 20x20 grid
        const tileCount = canvas.width / gridSize;

        // Game Variables
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; // Movement along X axis
        let dy = 0;        // Movement along Y axis
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameInterval;
        let gameRunning = false;
        let changingDirection = false; // Prevents fast double keypress bugs

        highScoreElement.textContent = highScore;

        // Start Game
        function startGame() {
            snake = [
                { x: 160, y: 200 },
                { x: 140, y: 200 },
                { x: 120, y: 200 }
            ];
            score = 0;
            dx = gridSize;
            dy = 0;
            scoreElement.textContent = score;
            restartBtn.style.display = 'none';
            generateFood();
            gameRunning = true;
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 100); // Speed: 100ms ticks
        }

        // Main Loop
        function gameLoop() {
            if (hasGameEnded()) {
                endGame();
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // Clear Canvas Frame
        function clearCanvas() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Draw Snake
        function drawSnake() {
            snake.forEach((part, index) => {
                // Head is brighter green
                ctx.fillStyle = index === 0 ? '#4CAF50' : '#81C784';
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
            });
        }

        // Move Snake Forward
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // Check if Snake eats Food
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                generateFood();
            } else {
                snake.pop(); // Remove tail if no food eaten
            }
        }

        // Generate Random Food Coordinates
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;

            // Make sure food doesn't spawn on top of the snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        // Draw Food
        function drawFood() {
            ctx.fillStyle = '#FF5252';
            ctx.fillRect(food.x, food.y, gridSize - 2, gridSize - 2);
        }

        // Collision Check
        function hasGameEnded() {
            // Collision with body
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // Collision with wall
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        // End Game Overlay
        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FF5252';
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);

            restartBtn.style.display = 'block';
        }

        function resetGame() {
            startGame();
        }

        // Keyboard Controls
        document.addEventListener('keydown', changeDirection);

        function changeDirection(event) {
            const keyPressed = event.key;

            if (changingDirection) return;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if ((keyPressed === 'ArrowLeft' || keyPressed === 'a' || keyPressed === 'A') && !goingRight) {
                dx = -gridSize;
                dy = 0;
                changingDirection = true;
            }
            if ((keyPressed === 'ArrowUp' || keyPressed === 'w' || keyPressed === 'W') && !goingDown) {
                dx = 0;
                dy = -gridSize;
                changingDirection = true;
            }
            if ((keyPressed === 'ArrowRight' || keyPressed === 'd' || keyPressed === 'D') && !goingLeft) {
                dx = gridSize;
                dy = 0;
                changingDirection = true;
            }
            if ((keyPressed === 'ArrowDown' || keyPressed === 's' || keyPressed === 'S') && !goingUp) {
                dx = 0;
                dy = gridSize;
                changingDirection = true;
            }
        }

        // Start on Load
        startGame();
    </script>
</body>
</html>
