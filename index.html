<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #00fff5;
            text-shadow: 0 0 10px rgba(0, 255, 245, 0.5);
        }

        .score-board {
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
        }

        .score-board div {
            background: #16213e;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #0f3460;
        }

        canvas {
            background-color: #0f3460;
            border: 4px solid #00fff5;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 245, 0.2);
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #a2a8d3;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #1a1a2e;
            background-color: #00fff5;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #00d8cf;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>Snake Game</h1>

    <div class="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>High Score: <span id="highScore">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <button id="restartBtn">Restart Game</button>
    <div class="controls-hint">Use <strong>Arrow Keys</strong> or <strong>W, A, S, D</strong> to play.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const restartBtn = document.getElementById("restartBtn");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        let gameInterval;
        let gameRunning = false;

        highScoreElement.textContent = highScore;

        function startGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0;
            dy = -1;
            score = 0;
            scoreElement.textContent = score;
            placeFood();
            gameRunning = true;

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 100);
        }

        function gameLoop() {
            update();
            draw();
        }

        function update() {
            if (!gameRunning) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall collisions
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem("snakeHighScore", highScore);
                }
                placeFood();
            } else {
                snake.pop();
            }
        }

        function drawGrid() {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
            ctx.lineWidth = 1;

            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = "#0f3460";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid
            drawGrid();

            // Draw Food
            ctx.fillStyle = "#e94560";
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // Draw Snake
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#00fff5" : "#00b4d8";
                ctx.fillRect(
                    part.x * gridSize + 1,
                    part.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };

            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    placeFood();
                }
            });
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameInterval);
            
            ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#e94560";
            ctx.font = "30px 'Segoe UI', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);

            ctx.fillStyle = "#ffffff";
            ctx.font = "16px 'Segoe UI', sans-serif";
            ctx.fillText("Press Restart to Play Again", canvas.width / 2, canvas.height / 2 + 25);
        }

        function handleKeyPress(e) {
            const key = e.key.toLowerCase();

            if ((key === "arrowup" || key === "w") && dy === 0) {
                dx = 0;
                dy = -1;
            } else if ((key === "arrowdown" || key === "s") && dy === 0) {
                dx = 0;
                dy = 1;
            } else if ((key === "arrowleft" || key === "a") && dx === 0) {
                dx = -1;
                dy = 0;
            } else if ((key === "arrowright" || key === "d") && dx === 0) {
                dx = 1;
                dy = 0;
            }
        }

        window.addEventListener("keydown", handleKeyPress);
        restartBtn.addEventListener("click", startGame);

        startGame();
    </script>
</body>
</html>
